name: Docker

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full history to resolve tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Required for linux/arm64 image assembly (opencode curl-install layer
      # and litellm upstream base still need per-arch buildx; Go compiles are
      # native cross-compilation so QEMU is not needed for them).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skip login on pull requests — images are built but not pushed.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set IMAGE_TAG and EXTRA_TAG for GoReleaser's docker_manifests templates.
      #
      # push to main  → IMAGE_TAG=latest   EXTRA_TAG=sha-<short>
      # push tag v*   → IMAGE_TAG=vX.Y.Z   EXTRA_TAG=X.Y.Z
      # pull_request  → IMAGE_TAG=latest   EXTRA_TAG=  (empty → manifests skipped)
      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          event="${{ github.event_name }}"
          ref="${{ github.ref }}"

          if [[ "$event" == "push" && "$ref" == refs/heads/* ]]; then
            echo "image_tag=latest"          >> "$GITHUB_OUTPUT"
            echo "extra_tag=sha-$short_sha"  >> "$GITHUB_OUTPUT"
          elif [[ "$event" == "push" && "$ref" == refs/tags/v* ]]; then
            version="${ref#refs/tags/v}"
            echo "image_tag=v$version"       >> "$GITHUB_OUTPUT"
            echo "extra_tag=$version"        >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest"          >> "$GITHUB_OUTPUT"
            echo "extra_tag="                >> "$GITHUB_OUTPUT"
          fi

      - name: Release (build & publish images)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          # Snapshot on PRs: builds everything but does not push.
          args: release --clean ${{ github.event_name == 'pull_request' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          EXTRA_TAG: ${{ steps.tags.outputs.extra_tag }}
