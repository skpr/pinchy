[tools]
go = "1.26"
"go:github.com/daixiang0/gci" = "latest"
"go:k8s.io/code-generator/cmd/client-gen" = { version = "v0.35.0" }
"go:sigs.k8s.io/controller-tools/cmd/controller-gen" = { version = "v0.20.0" }
"ubi:golangci/golangci-lint" = "2.10"
"ubi:goreleaser/goreleaser" = "2.14"

[env]
CGO_ENABLED=0
IMAGE="skpr/pinchy-grpc-go:latest"
PB_DIR="proto/pb"

[tasks.vendor]
description = "Vendor resets the main module's vendor directory to include all packages needed to build the application"
run = "go mod vendor"

[tasks.tidy]
description = "Tidy makes sure go.mod matches the source code in the module"
run = "go mod tidy"

[tasks.generate]
description = "Build the grpc protocol"
file = "scripts/generate.sh"
depends = ["vendor"]

[tasks.lint]
description = "Linting automatically checks code for errors and style issues"
run = "golangci-lint run"

[tasks.test]
description = "Checks to verify code correctness"
run = "go test -cover ./..."

[tasks.snapshot]
description = "Build all images locally via GoReleaser snapshot (tagged :*-dev)"
env = { IMAGE_TAG = "dev", EXTRA_TAG = "" }
run = "goreleaser release --snapshot --clean"

[tasks.up]
description = "Build snapshot images then start the full compose stack"
depends = ["snapshot"]
run = "docker compose up -d"

[tasks.start]
description = "Start the compose stack without rebuilding images"
run = "docker compose up -d"

[tasks.down]
description = "Stop and remove the compose stack"
run = "docker compose down"

[tasks.logs]
description = "Tail logs from all compose services"
run = "docker compose logs -f"

[tasks.release]
description = "Publish images via GoReleaser (requires IMAGE_TAG and EXTRA_TAG to be set)"
run = "goreleaser release --clean"
