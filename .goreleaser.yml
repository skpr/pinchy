    image_templates:
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:operator-latest"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-arm64"

  # ---- proxy --------------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:proxy-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:proxy-v{{ .Version }}"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:proxy-latest"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-arm64"

  # ---- board --------------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:board-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:board-v{{ .Version }}"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:board-latest"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-arm64"

  # ---- opencode -----------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:opencode-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:opencode-v{{ .Version }}"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:opencode-latest"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-arm64"

  # ---- litellm ------------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:litellm-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:litellm-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:litellm-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:litellm-v{{ .Version }}"
