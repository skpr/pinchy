version: 2

# Snapshot builds (local dev + main branch CI) use a fixed "dev" tag so
# docker-compose can always reference ghcr.io/skpr/pinchy:<component>-dev.
snapshot:
  version_template: "dev"

# No changelog / GitHub Release — images only.
release:
  disable: true

changelog:
  disable: true

# No binary archives.
archives:
  - formats: []

builds:
  - id: pinchy
    binary: pinchy
    main: ./cmd/pinchy
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-extldflags '-static'"]
    goos: [linux]
    goarch: [amd64, arm64]

  - id: pinchy-api
    binary: pinchy-api
    main: ./cmd/pinchy-api
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-extldflags '-static'"]
    goos: [linux]
    goarch: [amd64, arm64]

  - id: pinchy-operator
    binary: pinchy-operator
    main: ./cmd/pinchy-operator
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-extldflags '-static'"]
    goos: [linux]
    goarch: [amd64, arm64]

  - id: pinchy-proxy
    binary: pinchy-proxy
    main: ./cmd/pinchy-proxy
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-extldflags '-static'"]
    goos: [linux]
    goarch: [amd64, arm64]

  - id: pinchy-board
    binary: pinchy-board
    main: ./cmd/pinchy-board
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-extldflags '-static'"]
    goos: [linux]
    goarch: [amd64, arm64]

# ---------------------------------------------------------------------------
# Docker images — one entry per (component × arch).
# GoReleaser copies the matching pre-built binary into each build context,
# so the Dockerfiles only need a slim runtime stage.
#
# Tag scheme:
#   git tag vX.Y.Z  → <component>-vX.Y.Z, <component>-X.Y.Z, <component>-latest
#   main / snapshot → <component>-dev  (built but never pushed)
# ---------------------------------------------------------------------------

dockers:
  # ---- api ----------------------------------------------------------------
  - id: api-amd64
    ids: [pinchy-api]
    goarch: amd64
    dockerfile: images/api/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: api-arm64
    ids: [pinchy-api]
    goarch: arm64
    dockerfile: images/api/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

  # ---- operator -----------------------------------------------------------
  - id: operator-amd64
    ids: [pinchy-operator]
    goarch: amd64
    dockerfile: images/operator/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: operator-arm64
    ids: [pinchy-operator]
    goarch: arm64
    dockerfile: images/operator/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

  # ---- proxy --------------------------------------------------------------
  - id: proxy-amd64
    ids: [pinchy-proxy]
    goarch: amd64
    dockerfile: images/proxy/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: proxy-arm64
    ids: [pinchy-proxy]
    goarch: arm64
    dockerfile: images/proxy/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:proxy-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

  # ---- board --------------------------------------------------------------
  - id: board-amd64
    ids: [pinchy-board]
    goarch: amd64
    dockerfile: images/board/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: board-arm64
    ids: [pinchy-board]
    goarch: arm64
    dockerfile: images/board/Dockerfile
    image_templates:
      - "ghcr.io/skpr/pinchy:board-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

  # ---- opencode -----------------------------------------------------------
  - id: opencode-amd64
    ids: [pinchy]
    goarch: amd64
    dockerfile: images/opencode/Dockerfile
    extra_files:
      - images/opencode/opencode.json
      - images/opencode/tools
      - images/opencode/agents
    image_templates:
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: opencode-arm64
    ids: [pinchy]
    goarch: arm64
    dockerfile: images/opencode/Dockerfile
    extra_files:
      - images/opencode/opencode.json
      - images/opencode/tools
      - images/opencode/agents
    image_templates:
      - "ghcr.io/skpr/pinchy:opencode-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

  # ---- litellm ------------------------------------------------------------
  - id: litellm-amd64
    ids: []
    goarch: amd64
    dockerfile: images/litellm/Dockerfile
    extra_files:
      - images/litellm/config.yml
    image_templates:
      - "ghcr.io/skpr/pinchy:litellm-{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: litellm-arm64
    ids: []
    goarch: arm64
    dockerfile: images/litellm/Dockerfile
    extra_files:
      - images/litellm/config.yml
    image_templates:
      - "ghcr.io/skpr/pinchy:litellm-{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

# ---------------------------------------------------------------------------
# Manifests — stitch per-arch images into multi-arch tags.
# On a version tag: <component>-X.Y.Z, <component>-vX.Y.Z, <component>-latest
# On snapshot:      <component>-dev  (not pushed)
# ---------------------------------------------------------------------------

docker_manifests:
  # ---- api ----------------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:api-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:api-v{{ .Version }}"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:api-latest"
    skip_push: "{{ .IsSnapshot }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:api-{{ .Version }}-arm64"

  # ---- operator -----------------------------------------------------------
  - name_template: "ghcr.io/skpr/pinchy:operator-{{ .Version }}"
    image_templates:
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-amd64"
      - "ghcr.io/skpr/pinchy:operator-{{ .Version }}-arm64"

  - name_template: "ghcr.io/skpr/pinchy:operator-v{{ .Version }}"
